name: Build PrismTrack Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "260504-feat-prismtrack-spleeter-migration"
    paths:
      - ".github/workflows/build-windows.yml"
      - "PrismTrack-Spleeter/**"
  pull_request:
    paths:
      - ".github/workflows/build-windows.yml"
      - "PrismTrack-Spleeter/**"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: PrismTrack-Spleeter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: PrismTrack-Spleeter/package-lock.json

      - name: Verify required Windows runtime files
        run: |
          $required = @(
            "python/python.exe",
            "ffmpeg.exe",
            "ffprobe.exe",
            "ffplay.exe",
            "scripts/spleeter_separate.py"
          )

          $missing = @()
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              $missing += $item
            }
          }

          if ($missing.Count -gt 0) {
            Write-Error "Missing required runtime files:`n$($missing -join "`n")"
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prismtrack-windows-${{ github.run_number }}
          path: |
            PrismTrack-Spleeter/dist/**/*.exe
            PrismTrack-Spleeter/dist/**/*.zip
            PrismTrack-Spleeter/dist/**/*.yml
          if-no-files-found: error
