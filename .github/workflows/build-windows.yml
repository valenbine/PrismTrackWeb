name: Build PrismTrackWeb Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: false
        default: ''
      release_notes:
        description: '发布说明'
        required: false
        default: ''
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/build-windows.yml'
      - 'server.js'
      - 'launcher.js'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - '.github/workflows/build-windows.yml'
      - 'server.js'
      - 'launcher.js'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

env:
  APP_VERSION: ${{ github.event.inputs.version || '1.0.0' }}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Windows runtime baseline
        run: |
          $ErrorActionPreference = 'Stop'

          $zipUrl = 'https://makenweb.com/downloads/SpleeterGUI_2.9.4.0.zip'
          $zipPath = Join-Path $env:RUNNER_TEMP 'SpleeterGUI_2.9.4.0.zip'
          $extractRoot = Join-Path $env:RUNNER_TEMP 'spleetergui-runtime'

          Write-Host 'Downloading SpleeterGUI runtime...'
          if (-not (Test-Path $zipPath)) {
            Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing
          }

          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractRoot | Out-Null

          Write-Host 'Extracting runtime...'
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

          $pythonExe = Get-ChildItem -Path $extractRoot -Filter 'python.exe' -Recurse -File | Select-Object -First 1
          if (-not $pythonExe) {
            Write-Error 'Cannot locate python.exe inside extracted runtime archive.'
            exit 1
          }
          $pythonDir = Split-Path -Parent $pythonExe.FullName
          $sourceRoot = Split-Path -Parent $pythonDir
          Write-Host "Detected python dir: $pythonDir"
          Write-Host "Detected runtime root: $sourceRoot"

          if (Test-Path 'python') {
            Remove-Item 'python' -Recurse -Force
          }
          Copy-Item (Join-Path $sourceRoot 'python') -Destination 'python' -Recurse
          Copy-Item (Join-Path $sourceRoot 'ffmpeg.exe') -Destination 'ffmpeg.exe' -Force
          Copy-Item (Join-Path $sourceRoot 'ffprobe.exe') -Destination 'ffprobe.exe' -Force
          Copy-Item (Join-Path $sourceRoot 'ffplay.exe') -Destination 'ffplay.exe' -Force

          Write-Host 'Runtime files prepared successfully.'

      - name: Verify required runtime files
        run: |
          $required = @(
            'python\python.exe',
            'ffmpeg.exe',
            'ffprobe.exe',
            'ffplay.exe',
            'scripts\spleeter_separate.py'
          )

          $missing = @()
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              $missing += $item
            }
          }

          if ($missing.Count -gt 0) {
            Write-Error "Missing required runtime files:`n$($missing -join "`n")"
            exit 1
          }

          Write-Host 'All runtime files verified.'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          $nsisScript = @"
          !include "MUI2.nsh"
          !include "FileFunc.nsh"

          !define APP_NAME "PrismTrackWeb"
          !define APP_VERSION "$env:APP_VERSION"
          !define APP_PUBLISHER "valenbine"
          !define APP_URL "https://github.com/valenbine/PrismTrackWeb"

          OutFile "PrismTrackWeb-Setup-$env:APP_VERSION.exe"
          InstallDir "`$PROGRAMFILES64\PrismTrackWeb"
          InstallDirRegKey HKLM "Software\PrismTrackWeb" "InstallDir"

          !define MUI_ABORTWARNING

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_UNPAGE_FINISH

          !insertmacro MUI_LANGUAGE "English"
          !insertmacro MUI_LANGUAGE "SimpChinese"

          Name "PrismTrackWeb $env:APP_VERSION"
          BrandingText "PrismTrackWeb - Web Middleware for Music Separation"

          Section "PrismTrackWeb" SecMain
            SetOutPath "`$INSTDIR"

            WriteRegStr HKLM "Software\PrismTrackWeb" "InstallDir" "`$INSTDIR"
            WriteRegStr HKLM "Software\PrismTrackWeb" "Version" "$env:APP_VERSION"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\PrismTrackWeb" "DisplayName" "PrismTrackWeb"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\PrismTrackWeb" "UninstallString" '"`$INSTDIR\uninstall.exe"'
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\PrismTrackWeb" "DisplayVersion" "$env:APP_VERSION"
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\PrismTrackWeb" "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\PrismTrackWeb" "NoRepair" 1

            File /r "node_modules\"
            File "server.js"
            File "launcher.cjs"
            File "package.json"
            File "index.html"
            File "styles.css"
            File "favicon.svg"
            File "start.bat"
            File "ffmpeg.exe"
            File "ffprobe.exe"
            File "ffplay.exe"

            File /r "scripts\"
            File /r "src\"
            File /r "python\"

            CreateDirectory "`$APPDATA\PrismTrackWeb\.runtime"
            CreateDirectory "`$APPDATA\PrismTrackWeb\pretrained_models"

            CreateDirectory "`$SMPROGRAMS\PrismTrackWeb"
            CreateShortCut "`$SMPROGRAMS\PrismTrackWeb\PrismTrackWeb.lnk" "`$INSTDIR\start.bat" "" "`$INSTDIR\favicon.svg" 0
            CreateShortCut "`$SMPROGRAMS\PrismTrackWeb\Uninstall.lnk" "`$INSTDIR\uninstall.exe"

            CreateShortCut "`$DESKTOP\PrismTrackWeb.lnk" "`$INSTDIR\start.bat" "" "`$INSTDIR\favicon.svg" 0

            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\PrismTrackWeb"
            DeleteRegKey HKLM "Software\PrismTrackWeb"

            Delete "`$SMPROGRAMS\PrismTrackWeb\PrismTrackWeb.lnk"
            Delete "`$SMPROGRAMS\PrismTrackWeb\Uninstall.lnk"
            Delete "`$DESKTOP\PrismTrackWeb.lnk"
            RMDir "`$SMPROGRAMS\PrismTrackWeb"

            RMDir /r "`$INSTDIR\node_modules"
            RMDir /r "`$INSTDIR\scripts"
            RMDir /r "`$INSTDIR\src"
            RMDir /r "`$INSTDIR\python"
            Delete "`$INSTDIR\server.js"
            Delete "`$INSTDIR\launcher.js"
            Delete "`$INSTDIR\package.json"
            Delete "`$INSTDIR\index.html"
            Delete "`$INSTDIR\styles.css"
            Delete "`$INSTDIR\favicon.svg"
            Delete "`$INSTDIR\start.bat"
            Delete "`$INSTDIR\ffmpeg.exe"
            Delete "`$INSTDIR\ffprobe.exe"
            Delete "`$INSTDIR\ffplay.exe"
            Delete "`$INSTDIR\uninstall.exe"

            RMDir "`$INSTDIR"

            MessageBox MB_YESNO|MB_ICONQUESTION "Delete user data (models, separated stems)?" IDNO SkipUserData
            RMDir /r "`$APPDATA\PrismTrackWeb"
            SkipUserData:
          SectionEnd
          "@

          Set-Content -Path 'installer.nsi' -Value $nsisScript -Encoding UTF8
          Write-Host 'NSIS installer script created.'

      - name: Install NSIS
        run: |
          $ErrorActionPreference = 'Stop'

          # Try multiple download sources
          $urls = @(
            'https://sourceforge.net/projects/nsis/files/NSIS%203/3.08/nsis-3.08-setup.exe/download',
            'https://nchc.dl.sourceforge.net/project/nsis/NSIS%203/3.08/nsis-3.08-setup.exe'
          )

          $nsisPath = Join-Path $env:RUNNER_TEMP 'nsis-setup.exe'
          $installed = $false

          foreach ($url in $urls) {
            try {
              Write-Host "Trying: $url"
              Invoke-WebRequest -Uri $url -OutFile $nsisPath -UseBasicParsing -TimeoutSec 60
              if (Test-Path $nsisPath) {
                $fileSize = (Get-Item $nsisPath).Length
                if ($fileSize -gt 1MB) {
                  Write-Host "Downloaded $fileSize bytes"
                  Start-Process -FilePath $nsisPath -ArgumentList '/S', '/D=C:\Program Files (x86)\NSIS' -Wait -NoNewWindow
                  $installed = $true
                  break
                }
              }
            } catch {
              Write-Host "Failed: $_"
              continue
            }
          }

          if (-not $installed) {
            # Fallback: try choco
            choco install nsis -y --no-progress
          }

          # Find makensis.exe
          $makensis = Get-ChildItem -Path 'C:\Program Files (x86)\NSIS', 'C:\Program Files\NSIS' -Filter 'makensis.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $makensis) {
            Write-Error 'NSIS installation failed: makensis.exe not found'
            exit 1
          }
          Write-Host "NSIS installed at: $($makensis.FullName)"

          # Add to PATH
          $nsisDir = Split-Path $makensis.FullName
          echo "$nsisDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        run: |
          $makensis = Get-Command 'makensis' -ErrorAction SilentlyContinue
          if (-not $makensis) {
            $makensisPath = Get-ChildItem -Path 'C:\Program Files (x86)\NSIS', 'C:\Program Files\NSIS' -Filter 'makensis.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $makensisPath) {
              Write-Error 'Cannot find makensis.exe'
              exit 1
            }
            $makensis = $makensisPath.FullName
          } else {
            $makensis = $makensis.Source
          }
          Write-Host "Using makensis: $makensis"
          & $makensis installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error 'NSIS build failed'
            exit 1
          }
          Write-Host 'Installer built successfully.'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismTrackWeb-Setup-${{ env.APP_VERSION }}
          path: PrismTrackWeb-Setup-*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: PrismTrackWeb v${{ env.APP_VERSION }}
          body: |
            ## PrismTrackWeb Windows 安装包

            ${{ github.event.inputs.release_notes || '自动构建的 Windows 安装包。' }}

            ### 安装说明
            1. 下载 `PrismTrackWeb-Setup-${{ env.APP_VERSION }}.exe`
            2. 双击运行安装包
            3. 选择安装路径（默认: `C:\Program Files\PrismTrackWeb`）
            4. 完成后桌面会生成快捷方式
            5. 双击 `PrismTrackWeb` 图标启动服务

            ### 功能特性
            - 一键启动 Web 服务 (端口 8010)
            - 自动打开系统默认浏览器
            - 支持音乐分轨 (2stems/4stems/5stems)
            - 内置 Python + Spleeter + FFmpeg 运行时

            ### 系统要求
            - Windows 10/11 (x64)
            - 至少 2GB 可用磁盘空间
            - 建议 4GB+ 内存
          files: PrismTrackWeb-Setup-*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
