name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - 260504-feat-prismtrack-spleeter-migration

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: PrismTrack-Spleeter/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Install Spleeter
        working-directory: PrismTrack-Spleeter
        run: |
          pip install tensorflow==2.12.1 ffmpeg-python==0.2.0 httpx[http2]==0.19.0 norbert==0.2.1 numpy==1.24.3 pandas==1.5.3 typer==0.3.2
          pip install spleeter==2.4.2 --no-deps

      - name: Prepare bundled Python runtime
        working-directory: PrismTrack-Spleeter
        shell: pwsh
        run: |
          $pythonVersion = "3.10.11"
          $runtimeDir = ".runtime"
          $pythonRoot = "vendor/python"
          $sitePackages = Join-Path $pythonRoot "Lib/site-packages"
          $embedZip = Join-Path $runtimeDir "python-embed.zip"
          $getPip = Join-Path $runtimeDir "get-pip.py"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $pythonRoot | Out-Null
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-amd64.zip" -OutFile $embedZip
          Expand-Archive -Path $embedZip -DestinationPath $pythonRoot
          New-Item -ItemType Directory -Force -Path $sitePackages | Out-Null
          @(
            "python310.zip",
            ".",
            "Lib/site-packages",
            "import site"
          ) | Set-Content (Join-Path $pythonRoot "python310._pth")
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile $getPip
          & "$pythonRoot/python.exe" $getPip --no-warn-script-location
          & "$pythonRoot/python.exe" -m pip install --upgrade pip
          & "$pythonRoot/python.exe" -m pip install --no-warn-script-location --target "$sitePackages" tensorflow==2.12.1 ffmpeg-python==0.2.0 httpx[http2]==0.19.0 norbert==0.2.1 numpy==1.24.3 pandas==1.5.3 typer==0.3.2
          & "$pythonRoot/python.exe" -m pip install --no-warn-script-location --target "$sitePackages" spleeter==2.4.2 --no-deps

      - name: Prepare bundled ffmpeg
        working-directory: PrismTrack-Spleeter
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path vendor/ffmpeg/bin | Out-Null
          Copy-Item "C:/ProgramData/chocolatey/lib/ffmpeg/tools/ffmpeg/bin/ffmpeg.exe" "vendor/ffmpeg/bin/ffmpeg.exe"
          Copy-Item "C:/ProgramData/chocolatey/lib/ffmpeg/tools/ffmpeg/bin/ffprobe.exe" "vendor/ffmpeg/bin/ffprobe.exe"

      - name: Generate warmup audio
        working-directory: PrismTrack-Spleeter
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .runtime/model-warmup-input | Out-Null
          $path = ".runtime/model-warmup-input/windows-silence.wav"
          $sampleRate = 44100
          $seconds = 1
          $channels = 2
          $bitsPerSample = 16
          $samples = $sampleRate * $seconds
          $blockAlign = $channels * ($bitsPerSample / 8)
          $byteRate = $sampleRate * $blockAlign
          $dataSize = $samples * $blockAlign
          $fs = [System.IO.File]::Open($path, [System.IO.FileMode]::Create)
          $bw = New-Object System.IO.BinaryWriter($fs)
          $bw.Write([System.Text.Encoding]::ASCII.GetBytes("RIFF"))
          $bw.Write([int](36 + $dataSize))
          $bw.Write([System.Text.Encoding]::ASCII.GetBytes("WAVE"))
          $bw.Write([System.Text.Encoding]::ASCII.GetBytes("fmt "))
          $bw.Write([int]16)
          $bw.Write([short]1)
          $bw.Write([short]$channels)
          $bw.Write([int]$sampleRate)
          $bw.Write([int]$byteRate)
          $bw.Write([short]$blockAlign)
          $bw.Write([short]$bitsPerSample)
          $bw.Write([System.Text.Encoding]::ASCII.GetBytes("data"))
          $bw.Write([int]$dataSize)
          for ($i = 0; $i -lt $samples * $channels; $i++) { $bw.Write([short]0) }
          $bw.Close()

      - name: Prepare pretrained models
        working-directory: PrismTrack-Spleeter
        shell: pwsh
        run: |
          $release = "v1.4.0"
          $baseUrl = "https://github.com/deezer/spleeter/releases/download/$release"
          $downloadDir = ".runtime/model-downloads"
          $modelsDir = "pretrained_models"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null

          $checksums = @{
            "2stems" = "f3a90b39dd2874269e8b05a48a86745df897b848c61f3958efc80a39152bd692"
            "4stems" = "3adb4a50ad4eb18c7c4d65fcf4cf2367a07d48408a5eb7d03cd20067429dfaa8"
            "5stems" = "25a1e87eb5f75cc72a4d2d5467a0a50ac75f05611f877c278793742513cc7218"
          }

          foreach ($model in @("2stems", "4stems", "5stems")) {
            $archivePath = Join-Path $downloadDir "$model.tar.gz"
            Invoke-WebRequest -Uri "$baseUrl/$model.tar.gz" -OutFile $archivePath
            $actualHash = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLower()
            if ($actualHash -ne $checksums[$model]) {
              throw "Checksum mismatch for $model.tar.gz"
            }
            vendor/python/python.exe -c "import tarfile; tarfile.open(r'$archivePath').extractall(r'$modelsDir')"
            $probePath = Join-Path (Join-Path $modelsDir $model) ".probe"
            New-Item -ItemType File -Force -Path $probePath | Out-Null
          }

      - name: Install Node dependencies
        working-directory: PrismTrack-Spleeter
        run: npm install

      - name: Generate Windows icon set
        working-directory: PrismTrack-Spleeter
        run: npm run generate:icons

      - name: Build Windows installer
        working-directory: PrismTrack-Spleeter
        run: npm run dist:win

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: PrismTrack-windows
          path: |
            PrismTrack-Spleeter/release/*.exe
            PrismTrack-Spleeter/release/*.blockmap
            PrismTrack-Spleeter/release/latest*.yml
